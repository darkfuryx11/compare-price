<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#FBFAF7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ราคานำเข้า">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon.svg">
<title>ต้นทุนนำเข้า · จีน→ไทย</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --bg-app:#FBFAF7;--bg-card:#FFFFFF;--bg-secondary:#F1EFE8;--bg-inset:#F5F4EF;
  --text:#1A1916;--text-2:#6B6760;--text-3:#9C978C;
  --border:rgba(22,20,14,0.12);--border-strong:rgba(22,20,14,0.20);
  --accent:#1D9E75;--accent-soft:rgba(29,158,117,0.12);
  --pos-bg:rgba(29,158,117,0.14);--pos:#15835F;
  --neg-bg:rgba(199,71,54,0.13);--neg:#C0432F;
  --r-lg:18px;--r-md:12px;--r-sm:9px;
}
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;overscroll-behavior:none;}
body{
  background:var(--bg-app);color:var(--text);
  font-family:'IBM Plex Sans Thai','IBM Plex Sans',system-ui,-apple-system,sans-serif;
  font-weight:400;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  min-height:100dvh;
}
#root{
  max-width:480px;margin:0 auto;
  padding-bottom:max(env(safe-area-inset-bottom,0px),24px);
}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1;}
.mono{font-family:'IBM Plex Mono','IBM Plex Sans Thai',monospace;font-variant-numeric:tabular-nums;}

/* app shell */
.app{padding:6px 16px 4px;}
.appbar{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:calc(env(safe-area-inset-top,0px) + 10px);
  padding-bottom:14px;padding-left:2px;padding-right:2px;
}
.appbar .title{font-size:16px;font-weight:500;letter-spacing:-0.01em;}
.appbar .title small{display:block;font-size:11.5px;color:var(--text-3);font-weight:400;letter-spacing:0;margin-top:1px;}
.iconbtn{
  width:38px;height:38px;border-radius:10px;border:0.5px solid var(--border);
  background:var(--bg-card);display:flex;align-items:center;justify-content:center;
  color:var(--text-2);cursor:pointer;-webkit-appearance:none;appearance:none;
}

/* rate bar */
.ratebar{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 15px;border:0.5px solid var(--border);border-radius:var(--r-md);
  background:var(--bg-card);margin-bottom:14px;
}
.ratebar .rb-left{display:flex;flex-direction:column;gap:3px;}
.ratebar .rb-label{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--text-2);}
.livedot{width:7px;height:7px;border-radius:50%;background:var(--accent);position:relative;flex:none;}
.livedot::after{
  content:"";position:absolute;inset:-4px;border-radius:50%;
  background:var(--accent);opacity:.32;animation:pulse 1.9s ease-out infinite;
}
.livedot.offline{background:var(--text-3);}
.livedot.offline::after{animation:none;background:var(--text-3);}
@keyframes pulse{0%{transform:scale(.7);opacity:.45;}70%{transform:scale(2.1);opacity:0;}100%{opacity:0;}}
.live-txt{color:var(--accent);font-weight:500;letter-spacing:.04em;text-transform:uppercase;font-size:10.5px;}
.live-txt.offline{color:var(--text-3);}
.ratebar .rate-val{font-size:18px;font-weight:500;letter-spacing:-0.01em;}
.ratebar .rate-val small{font-size:12.5px;color:var(--text-2);font-weight:400;}
.ratebar .rb-right{text-align:right;display:flex;flex-direction:column;gap:3px;align-items:flex-end;}
.ratebar .rb-delta{font-size:11.5px;font-weight:500;}
.ratebar .rb-time{font-size:10.5px;color:var(--text-3);white-space:nowrap;}

/* mode toggle */
.modetoggle{
  display:flex;background:var(--bg-inset);border:0.5px solid var(--border);
  border-radius:var(--r-md);padding:3px;margin-bottom:16px;gap:3px;
}
.modetoggle button{
  flex:1;min-height:44px;border:none;background:transparent;border-radius:9px;
  cursor:pointer;font-family:inherit;font-size:13.5px;color:var(--text-2);font-weight:400;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:background .15s,color .15s;-webkit-appearance:none;appearance:none;
}
.modetoggle button.active{background:var(--bg-card);color:var(--text);font-weight:500;border:0.5px solid var(--border);}
.modetoggle button .arr{color:var(--text-3);}
.modetoggle button.active .arr{color:var(--accent);}

/* cards */
.card{background:var(--bg-card);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:16px;margin-bottom:14px;}
.card-label{font-size:11.5px;color:var(--text-2);font-weight:500;letter-spacing:.01em;margin-bottom:12px;display:flex;align-items:center;gap:7px;}
.price-grid{display:grid;grid-template-columns:1fr 116px;gap:10px;}
.field{display:flex;flex-direction:column;gap:6px;}
.field .fl{font-size:11px;color:var(--text-3);font-weight:400;}
.inputwrap{
  display:flex;align-items:center;gap:6px;background:var(--bg-inset);
  border:0.5px solid var(--border);border-radius:var(--r-sm);padding:0 12px;min-height:52px;
  transition:border-color .15s;
}
.inputwrap:focus-within{border-color:var(--accent);background:var(--bg-card);}
.inputwrap .pfx{font-size:17px;color:var(--text-3);font-weight:500;}
.inputwrap .sfx{font-size:12px;color:var(--text-3);white-space:nowrap;}
.inputwrap input{
  border:none;background:transparent;outline:none;font-family:inherit;
  font-size:19px;font-weight:500;color:var(--text);width:100%;min-width:0;
  padding:0;font-variant-numeric:tabular-nums;
}
.inputwrap input::placeholder{color:var(--text-3);font-weight:400;}

/* fees */
.fees-head{display:flex;align-items:center;justify-content:space-between;margin:2px 2px 10px;}
.fees-head .ft{font-size:11.5px;color:var(--text-2);font-weight:500;letter-spacing:.06em;text-transform:uppercase;}
.fees-head .fc{font-size:11.5px;color:var(--text-3);}
.feerow{
  display:flex;align-items:center;gap:8px;background:var(--bg-card);
  border:0.5px solid var(--border);border-radius:var(--r-md);padding:7px 8px 7px 12px;margin-bottom:9px;
}
.feerow.empty{border-style:dashed;background:transparent;}
.feerow .fname{flex:1;min-width:0;border:none;background:transparent;outline:none;font-family:inherit;font-size:14px;color:var(--text);font-weight:400;padding:8px 0;}
.feerow .fname::placeholder{color:var(--text-3);}
.feerow .famt{width:62px;border:none;background:transparent;outline:none;font-family:inherit;font-size:15px;font-weight:500;color:var(--text);text-align:right;padding:8px 0;font-variant-numeric:tabular-nums;}
.feerow .famt::placeholder{color:var(--text-3);font-weight:400;}
.unittoggle{display:flex;background:var(--bg-inset);border:0.5px solid var(--border);border-radius:8px;padding:2px;flex:none;}
.unittoggle button{
  width:30px;height:32px;border:none;background:transparent;border-radius:6px;cursor:pointer;
  font-family:inherit;font-size:14px;color:var(--text-3);font-weight:500;
  display:flex;align-items:center;justify-content:center;-webkit-appearance:none;appearance:none;
}
.unittoggle button.on{background:var(--accent);color:#fff;}
.delbtn{width:32px;height:44px;border:none;background:transparent;cursor:pointer;color:var(--text-3);display:flex;align-items:center;justify-content:center;flex:none;border-radius:8px;-webkit-appearance:none;appearance:none;}
.addfee{
  width:100%;min-height:46px;border:0.5px dashed var(--border-strong);background:transparent;
  border-radius:var(--r-md);color:var(--text-2);font-family:inherit;font-size:13.5px;
  font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  margin-top:2px;-webkit-appearance:none;appearance:none;transition:border-color .15s,color .15s;
}
.addfee:active{border-color:var(--accent);color:var(--accent);}

.sellrow{margin-top:14px;}
.derived{display:flex;flex-wrap:wrap;gap:4px 10px;margin-top:12px;font-size:12px;color:var(--text-2);}
.derived span{white-space:nowrap;}
.derived b{font-weight:500;color:var(--text);}
.divider-soft{height:0.5px;background:var(--border);margin:14px 0;}

/* result */
.result{background:var(--bg-secondary);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:18px 17px;margin-top:16px;}
.result .res-kicker{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-2);font-weight:500;margin-bottom:14px;display:flex;align-items:center;gap:7px;}
.hero{display:flex;flex-direction:column;gap:3px;}
.hero .hv{font-size:38px;font-weight:500;letter-spacing:-0.02em;line-height:1;}
.hero .hl{font-size:12.5px;color:var(--text-2);}
.res-total{display:flex;align-items:baseline;justify-content:space-between;padding:13px 0 0;margin-top:13px;border-top:0.5px solid var(--border);}
.res-total .rl{font-size:13px;color:var(--text-2);}
.res-total .rv{font-size:17px;font-weight:500;}
.breakdown{margin-top:14px;border-top:0.5px solid var(--border);padding-top:13px;display:flex;flex-direction:column;}
.bd-title{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);font-weight:500;margin-bottom:8px;}
.bd-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;font-size:13px;}
.bd-row .bl{color:var(--text-2);display:flex;align-items:center;gap:7px;}
.bd-row .bl .pct{font-size:10.5px;color:var(--text-3);background:var(--bg-inset);border:0.5px solid var(--border);padding:1px 6px;border-radius:5px;}
.bd-row .bv{font-weight:500;color:var(--text);white-space:nowrap;}
.bd-row .bv.op{color:var(--text-3);font-weight:400;}
.margin{margin-top:15px;border-top:0.5px solid var(--border);padding-top:15px;}
.margin-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;}
.margin-head .mh{font-size:12.5px;color:var(--text-2);font-weight:500;}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:14px;font-weight:500;padding:5px 11px;border-radius:999px;font-variant-numeric:tabular-nums;}
.badge.pos{background:var(--pos-bg);color:var(--pos);}
.badge.neg{background:var(--neg-bg);color:var(--neg);}
.badge svg{width:13px;height:13px;}
.mstats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:0.5px solid var(--border);border-radius:var(--r-md);overflow:hidden;}
.mstat{background:var(--bg-secondary);padding:11px 13px;display:flex;flex-direction:column;gap:3px;}
.mstat .ml{font-size:11px;color:var(--text-2);}
.mstat .mv{font-size:16px;font-weight:500;letter-spacing:-0.01em;}
.mstat .mv.pos{color:var(--pos);}
.mstat .mv.neg{color:var(--neg);}
.rev-note{font-size:12px;color:var(--text-2);background:var(--bg-inset);border:0.5px solid var(--border);border-radius:var(--r-sm);padding:9px 12px;margin-top:14px;line-height:1.5;}
.hint{font-size:11.5px;color:var(--text-3);text-align:center;padding:10px 0 6px;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const fmt = (n, d=2) => (isFinite(n)?n:0).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const THB = (n, d=2) => '฿'+fmt(n,d);
const CNY = (n, d=2) => '¥'+fmt(n,d);
const INT = (n) => (isFinite(n)?n:0).toLocaleString('en-US');
let _id = 100;
const uid = () => ++_id;

const IconPlus = () => <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>;
const IconX = () => <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M4.5 4.5l7 7M11.5 4.5l-7 7" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/></svg>;
const IconUp = () => <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M7 11V3M3.5 6.5L7 3l3.5 3.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>;
const IconDown = () => <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M7 3v8M3.5 7.5L7 11l3.5-3.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>;
const IconRefresh = () => <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M3 10a7 7 0 0 1 13-3.5M17 10a7 7 0 0 1-13 3.5" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/><path d="M16 3v4h-4" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/><path d="M4 17v-4h4" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg>;

/* calc engine */
function computeForward(cny, qty, rate, fees, sell) {
  const goods = cny * rate * qty;
  let fixedTotal = 0, pctRate = 0;
  fees.forEach(f => { const a = parseFloat(f.amount)||0; if(f.type==='percent') pctRate+=a; else fixedTotal+=a; });
  const pctTotal = goods * (pctRate/100);
  const total = goods + fixedTotal + pctTotal;
  const perUnit = qty ? total/qty : 0;
  const lines = [{label:'ค่าสินค้า', val:goods}];
  fees.forEach(f => {
    const a = parseFloat(f.amount)||0;
    const v = f.type==='percent' ? goods*(a/100) : a;
    lines.push({label:f.name||'ค่าธรรมเนียม', val:v, pct:f.type==='percent'?a:null});
  });
  const s = parseFloat(sell)||0;
  const revenue = s*qty, profit = revenue-total;
  const margin = revenue ? (profit/revenue)*100 : 0;
  const markup = total ? (profit/total)*100 : 0;
  return {goods,fixedTotal,pctRate,pctTotal,total,perUnit,lines,
    hasSell:s>0,revenue,profit,margin,markup,profitUnit:qty?profit/qty:0,qty};
}

function computeCompetitor(packPrice, packQty, marginPct, rate, fees) {
  const unitSell = packQty ? packPrice/packQty : 0;
  const m = marginPct||0;
  const unitCost = unitSell/(1+m/100);
  let fixedTotal = 0, pctRate = 0;
  fees.forEach(f => { const a = parseFloat(f.amount)||0; if(f.type==='percent') pctRate+=a; else fixedTotal+=a; });
  const fixedPerUnit = packQty ? fixedTotal/packQty : 0;
  const goodsThb = (unitCost - fixedPerUnit)/(1+pctRate/100);
  const cny = rate ? goodsThb/rate : 0;
  return {unitSell,unitCost,fixedPerUnit,pctRate,goodsThb,cny,packPrice,packQty,marginPct:m,valid:goodsThb>0};
}

/* exchange rate */
function useExchangeRate() {
  const [rate, setRate] = useState(() => {
    try { return parseFloat(localStorage.getItem('cny_thb_rate')||'4.92'); } catch(e) { return 4.92; }
  });
  const [info, setInfo] = useState({time:null,delta:null,live:false,loading:true});

  const doFetch = useCallback(async () => {
    setInfo(p => ({...p, loading:true}));
    try {
      const res = await fetch('https://open.er-api.com/v6/latest/CNY');
      const d = await res.json();
      if (d.result==='success' && d.rates?.THB) {
        const nr = d.rates.THB;
        let delta = null;
        try {
          const prev = parseFloat(localStorage.getItem('cny_thb_prev')||'0');
          if (prev>0) delta = (nr-prev)/prev*100;
          localStorage.setItem('cny_thb_prev', localStorage.getItem('cny_thb_rate')||String(nr));
          localStorage.setItem('cny_thb_rate', String(nr));
        } catch(e){}
        const bkk = new Date((d.time_last_update_unix*1000) + 7*3600000);
        const hh = String(bkk.getUTCHours()).padStart(2,'0');
        const mm = String(bkk.getUTCMinutes()).padStart(2,'0');
        setRate(nr);
        setInfo({time:`${hh}:${mm}`, delta, live:true, loading:false});
      }
    } catch(e) {
      setInfo(p => ({...p, live:false, loading:false}));
    }
  }, []);

  useEffect(() => { doFetch(); const id=setInterval(doFetch,10*60*1000); return ()=>clearInterval(id); }, [doFetch]);
  return {rate, info, refresh:doFetch};
}

/* components */
function RateBar({rate, info, onRefresh}) {
  const pos = (info.delta||0) >= 0;
  return (
    <div className="ratebar" onClick={onRefresh} style={{cursor:'pointer'}}>
      <div className="rb-left">
        <span className="rb-label">
          <span className={`livedot${info.live?'':' offline'}`}></span>
          <span className={`live-txt${info.live?'':' offline'}`}>{info.loading?'กำลังโหลด':info.live?'Live':'แคช'}</span>
          <span>อัตราแลกเปลี่ยนวันนี้</span>
        </span>
        <span className="rate-val num">1 ¥ = {fmt(rate)} <small>฿</small></span>
      </div>
      <div className="rb-right">
        {info.delta !== null && (
          <span className="rb-delta num" style={{color:pos?'var(--accent)':'var(--neg)'}}>
            {pos?'▲':'▼'} {Math.abs(info.delta).toFixed(2)}%
          </span>
        )}
        <span className="rb-time">{info.time?`อัปเดต ${info.time} น.`:'แตะเพื่อรีเฟรช'}</span>
      </div>
    </div>
  );
}

function ModeToggle({mode, onMode}) {
  return (
    <div className="modetoggle" role="tablist">
      <button className={mode==='fwd'?'active':''} onClick={()=>onMode('fwd')} role="tab">ราคาจีน <span className="arr">→</span> ไทย</button>
      <button className={mode==='rev'?'active':''} onClick={()=>onMode('rev')} role="tab">ราคาไทย <span className="arr">→</span> จีน</button>
    </div>
  );
}

function NumInput({value, onChange, prefix, suffix}) {
  return (
    <div className="inputwrap">
      {prefix && <span className="pfx">{prefix}</span>}
      <input inputMode="decimal" value={value} placeholder="0"
        onChange={e => onChange(e.target.value.replace(/[^0-9.]/g,''))} />
      {suffix && <span className="sfx">{suffix}</span>}
    </div>
  );
}

function FeeRow({fee, onChange, onDelete}) {
  const empty = !fee.name && !fee.amount;
  return (
    <div className={`feerow${empty?' empty':''}`}>
      <input className="fname" value={fee.name} placeholder="ชื่อรายการ" onChange={e=>onChange({...fee,name:e.target.value})} />
      <input className="famt num" inputMode="decimal" value={fee.amount} placeholder="0"
        onChange={e=>onChange({...fee,amount:e.target.value.replace(/[^0-9.]/g,'')})} />
      <div className="unittoggle">
        <button className={fee.type==='fixed'?'on':''} onClick={()=>onChange({...fee,type:'fixed'})}>฿</button>
        <button className={fee.type==='percent'?'on':''} onClick={()=>onChange({...fee,type:'percent'})}>%</button>
      </div>
      <button className="delbtn" onClick={onDelete} aria-label="ลบ"><IconX /></button>
    </div>
  );
}

function MarginBlock({r}) {
  const pos = r.profit >= 0;
  return (
    <div className="margin">
      <div className="margin-head">
        <span className="mh">กำไรขั้นต้น</span>
        <span className={`badge ${pos?'pos':'neg'}`}>{pos?<IconUp/>:<IconDown/>}{(pos?'+':'')+fmt(r.margin,1)+'%'}</span>
      </div>
      <div className="mstats">
        <div className="mstat"><span className="ml">กำไร / ชิ้น</span><span className={`mv num ${pos?'pos':'neg'}`}>{(pos?'+':'−')+THB(Math.abs(r.profitUnit))}</span></div>
        <div className="mstat"><span className="ml">กำไรรวม</span><span className={`mv num ${pos?'pos':'neg'}`}>{(pos?'+':'−')+THB(Math.abs(r.profit),0)}</span></div>
        <div className="mstat"><span className="ml">มาร์กอัป</span><span className="mv num">{fmt(r.markup,1)}%</span></div>
        <div className="mstat"><span className="ml">ราคาขาย / ชิ้น</span><span className="mv num">{THB(r.revenue/(r.qty||1))}</span></div>
      </div>
    </div>
  );
}

function ResultFwd({r}) {
  return (
    <div className="result">
      <div className="res-kicker"><span className="livedot" style={{animation:'none'}}></span>ต้นทุนรวมเมื่อถึงไทย</div>
      <div className="hero"><span className="hv num">{THB(r.perUnit)}</span><span className="hl">ต้นทุนต่อชิ้น</span></div>
      <div className="res-total"><span className="rl">ต้นทุนทั้งหมด · {INT(r.qty)} ชิ้น</span><span className="rv num">{THB(r.total,0)}</span></div>
      <div className="breakdown">
        <div className="bd-title">รายละเอียด</div>
        {r.lines.map((l,i) => (
          <div className="bd-row" key={i}>
            <span className="bl">{l.label}{l.pct!=null && <span className="pct num">{l.pct}%</span>}</span>
            <span className="bv num">{THB(l.val,0)}</span>
          </div>
        ))}
      </div>
      {r.hasSell && <MarginBlock r={r} />}
    </div>
  );
}

function ResultRev({c, rate}) {
  return (
    <div className="result">
      <div className="res-kicker"><span className="livedot" style={{animation:'none'}}></span>ราคาที่คาดว่าคู่แข่งซื้อจากจีน</div>
      <div className="hero">
        <span className="hv num" style={{color:c.valid?'var(--accent)':'var(--neg)'}}>≈ {CNY(c.cny)}</span>
        <span className="hl">ต้นทุนจีนโดยประมาณ / ชิ้น · คิดเป็น <b style={{fontWeight:500,color:'var(--text)'}}>{THB(c.goodsThb)}</b></span>
      </div>
      <div className="breakdown">
        <div className="bd-title">ถอดจากราคาขายคู่แข่ง</div>
        <div className="bd-row"><span className="bl">ราคาขาย / ลัง</span><span className="bv num">{THB(c.packPrice,0)}</span></div>
        <div className="bd-row">
          <span className="bl">÷ บรรจุ <span className="pct num">{INT(c.packQty)} ชิ้น</span></span>
          <span className="bv num">{THB(c.unitSell)}<span style={{color:'var(--text-3)',fontWeight:400}}> /ชิ้น</span></span>
        </div>
        {c.marginPct > 0 && (
          <div className="bd-row">
            <span className="bl">− กำไรคู่แข่ง <span className="pct num">{fmt(c.marginPct,0)}%</span></span>
            <span className="bv num">{THB(c.unitCost)}<span style={{color:'var(--text-3)',fontWeight:400}}> ทุน</span></span>
          </div>
        )}
        <div className="bd-row"><span className="bl">− ค่าธรรมเนียมคงที่ /ชิ้น</span><span className="bv num op">−{THB(c.fixedPerUnit)}</span></div>
        <div className="bd-row"><span className="bl">− ภาษี <span className="pct num">{c.pctRate}%</span></span><span className="bv num op">÷ {fmt(1+c.pctRate/100,2)}</span></div>
        <div className="bd-row" style={{borderTop:'0.5px solid var(--border)',paddingTop:'10px',marginTop:'3px'}}>
          <span className="bl" style={{color:'var(--text)'}}>= ค่าสินค้า (ไทย)</span><span className="bv num">{THB(c.goodsThb)}</span>
        </div>
        <div className="bd-row"><span className="bl">÷ อัตราแลกเปลี่ยน</span><span className="bv num op">÷ {fmt(rate)}</span></div>
      </div>
      {c.valid
        ? <div className="rev-note">คู่แข่งน่าจะรับของจากจีนราว <b style={{fontWeight:500,color:'var(--text)'}}>{CNY(c.cny)}/ชิ้น</b> ({THB(c.goodsThb)}) — เทียบต้นทุนเราเพื่อดูว่าต่อราคาได้อีกไหม</div>
        : <div className="rev-note" style={{color:'var(--neg)',background:'var(--neg-bg)',borderColor:'transparent'}}>ราคาขายต่ำกว่าค่าธรรมเนียม — ลองเช็กจำนวนบรรจุ / กำไรคู่แข่งอีกครั้ง</div>
      }
    </div>
  );
}

const demoFees = () => ([
  {id:uid(), name:'ค่าขนส่ง', amount:'300', type:'fixed'},
  {id:uid(), name:'ภาษีนำเข้า', amount:'5', type:'percent'},
]);

function App() {
  const {rate, info, refresh} = useExchangeRate();
  const [mode, setMode] = useState('fwd');
  const [cny, setCny] = useState('45');
  const [qty, setQty] = useState('100');
  const [sell, setSell] = useState('320');
  const [packPrice, setPackPrice] = useState('32000');
  const [packQty, setPackQty] = useState('100');
  const [compMargin, setCompMargin] = useState('30');
  const [fees, setFees] = useState(demoFees);

  const updFee = (id, nf) => setFees(fees.map(f => f.id===id?nf:f));
  const delFee = (id) => setFees(fees.filter(f => f.id!==id));
  const addFee = () => setFees([...fees, {id:uid(), name:'', amount:'', type:'fixed'}]);

  const r = computeForward(parseFloat(cny)||0, parseFloat(qty)||0, rate, fees, sell);
  const comp = computeCompetitor(parseFloat(packPrice)||0, parseFloat(packQty)||0, parseFloat(compMargin)||0, rate, fees);

  return (
    <div className="app">
      <div className="appbar">
        <div className="title">นำเข้าจากจีน<small>Landed-cost calculator</small></div>
        <button className="iconbtn" onClick={refresh} aria-label="รีเฟรช"><IconRefresh /></button>
      </div>

      <RateBar rate={rate} info={info} onRefresh={refresh} />
      <ModeToggle mode={mode} onMode={setMode} />

      {mode === 'fwd' ? (
        <div className="card">
          <div className="card-label">ราคาต้นทุนจากจีน</div>
          <div className="price-grid">
            <div className="field"><span className="fl">ราคา / ชิ้น (CNY)</span><NumInput value={cny} onChange={setCny} prefix="¥" /></div>
            <div className="field"><span className="fl">จำนวน</span><NumInput value={qty} onChange={setQty} suffix="ชิ้น" /></div>
          </div>
        </div>
      ) : (
        <div className="card">
          <div className="card-label">ราคาขายคู่แข่งในไทย</div>
          <div className="price-grid">
            <div className="field"><span className="fl">ราคาขาย / ลัง (THB)</span><NumInput value={packPrice} onChange={setPackPrice} prefix="฿" /></div>
            <div className="field"><span className="fl">บรรจุ / ลัง (ชิ้น)</span><NumInput value={packQty} onChange={setPackQty} suffix="ชิ้น" /></div>
          </div>
          <div className="derived">
            <span>= ราคาขาย <b className="num">{THB(comp.unitSell)}</b>/ชิ้น</span>
            {comp.marginPct > 0 && <span>· หลังหักกำไร <b className="num">{THB(comp.unitCost)}</b></span>}
          </div>
          <div className="divider-soft"></div>
          <div className="field">
            <span className="fl">กำไรคู่แข่งโดยประมาณ — ใส่เพื่อถอดต้นทุน (ไม่บังคับ)</span>
            <NumInput value={compMargin} onChange={setCompMargin} suffix="% กำไร" />
          </div>
        </div>
      )}

      <div className="fees-head">
        <span className="ft">ค่าธรรมเนียม &amp; ภาษี</span>
        <span className="fc num">{fees.length} รายการ</span>
      </div>
      {fees.map(f => <FeeRow key={f.id} fee={f} onChange={(nf)=>updFee(f.id,nf)} onDelete={()=>delFee(f.id)} />)}
      <button className="addfee" onClick={addFee}><IconPlus /> เพิ่มค่าธรรมเนียม</button>

      {mode === 'fwd' && (
        <div className="card sellrow">
          <div className="field">
            <span className="fl">ราคาขายในไทย / ชิ้น — ใส่เพื่อดูกำไร (ไม่บังคับ)</span>
            <NumInput value={sell} onChange={setSell} prefix="฿" suffix="THB" />
          </div>
        </div>
      )}

      {mode === 'fwd' ? <ResultFwd r={r} /> : <ResultRev c={comp} rate={rate} />}

      <div className="hint">ตัวเลขอัปเดตอัตโนมัติเมื่อพิมพ์ · อัตราแลกเปลี่ยนอัปเดตทุก 24 ชม.</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(()=>{}));
}
</script>
</body>
</html>
